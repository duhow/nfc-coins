name: Release Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version-file: .java-version
          distribution: temurin
          cache: gradle

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace
        env:
          NFC_POS_PSK: ${{ secrets.NFC_POS_PSK }}

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Sign APK with apksigner
        run: |
          BUILD_TOOLS_DIR=$(find "$ANDROID_SDK_ROOT/build-tools" -maxdepth 1 -type d | sort -V | tail -n 1)
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-key-alias "${{ github.event.repository.name }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_DIR=$(find "$ANDROID_SDK_ROOT/build-tools" -maxdepth 1 -type d | sort -V | tail -n 1)
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Rename APK with app name and version
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
            "nfc-coins-${{ github.ref_name }}.apk"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: "nfc-coins-${{ github.ref_name }}.apk"
