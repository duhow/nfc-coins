name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version-file: .java-version
          distribution: temurin
          cache: gradle

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          NFC_POS_PSK: ${{ secrets.NFC_POS_PSK }}

      - name: Upload debug APK
        id: upload_debug_apk
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          archive: false
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Comment debug artifact download link
        if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: debug-apk-download
          message: |
            ✅ Debug APK artifact is ready for this commit.
            - APK artifact: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload_debug_apk.outputs.artifact-id }}
            - Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
