name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          NFC_POS_PSK: ${{ secrets.NFC_POS_PSK }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          archive: false
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace
        env:
          NFC_POS_PSK: ${{ secrets.NFC_POS_PSK }}

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Sign APK with apksigner
        run: |
          BUILD_TOOLS_DIR=$(find "$ANDROID_SDK_ROOT/build-tools" -maxdepth 1 -type d | sort -V | tail -n 1)
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-key-alias "${{ github.event.repository.name }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_DIR=$(find "$ANDROID_SDK_ROOT/build-tools" -maxdepth 1 -type d | sort -V | tail -n 1)
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          archive: false
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
